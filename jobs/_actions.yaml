# ── Preprocessing raw ManiSkill demos → .pt ────────────────────────────
preprocess: |
  uv run python scripts/preprocess_data.py \
      --skill {skill} \
      --raw-dir {raw_dir} \
      --out-dir {out_dir} \
      --num-cameras {num_cameras} \
      --image-size {image_size}

# ── SFT on preprocessed .pt data (ManiSkill / any sim eval) ───────────
train-sft: |
  uv run python scripts/train_sft.py \
      --data {data} \
      --env {env_id} \
      --num-demos {num_demos} \
      --seed {seed} \
      --checkpoint {checkpoint} \
      --lr {lr} \
      --batch-size {batch_size} \
      --micro-batch-size {micro_batch_size} \
      --epochs {num_epochs} \
      --warmup-steps {warmup_steps} \
      --decay-steps {decay_steps} \
      --decay-lr {decay_lr} \
      --grad-clip-norm {grad_clip_norm} \
      --eval-every {eval_every} \
      --eval-episodes {eval_episodes} \
      --max-steps {max_steps} \
      --simulator {simulator} \
      --eval-suite {eval_suite} \
      --wandb

# ── SFT on Libero data loaded directly from HuggingFace ───────────────
train-sft-libero: |
  uv run python scripts/train_sft.py \
      --libero-suite {libero_suite} \
      --env {env_id} \
      --num-demos {num_demos} \
      --seed {seed} \
      --checkpoint {checkpoint} \
      --lr {lr} \
      --batch-size {batch_size} \
      --micro-batch-size {micro_batch_size} \
      --epochs {num_epochs} \
      --warmup-steps {warmup_steps} \
      --decay-steps {decay_steps} \
      --decay-lr {decay_lr} \
      --grad-clip-norm {grad_clip_norm} \
      --eval-every {eval_every} \
      --eval-episodes {eval_episodes} \
      --max-steps {max_steps} \
      --simulator {simulator} \
      --eval-suite {eval_suite} \
      --wandb

# ── SRPO / sparse-RL from an SFT checkpoint ───────────────────────────
train-srpo: |
  uv run python scripts/train_srpo.py \
      --sft-checkpoint {sft_checkpoint} \
      --simulator {simulator} \
      --suite {suite} \
      --task-ids {task_id} \
      --data {data} \
      --mode {mode} \
      --num-demos {num_demos} \
      --seed {seed} \
      --lr {lr} \
      --iterations {num_iterations} \
      --num-rollout-envs {num_rollout_envs} \
      --fm-batch-size {fm_batch_size} \
      --ppo-epochs {ppo_epochs} \
      --clip-epsilon {clip_epsilon} \
      --kl-coeff {kl_coeff} \
      --eval-every {eval_every} \
      --eval-episodes {eval_episodes} \
      --max-steps {max_steps} \
      --world-model {world_model} \
      --wandb

# ── SRPO / sparse-RL on Libero (sets up LIBERO_PATH first) ────────────
train-srpo-libero: |
  export LIBERO_PATH=/work3/s234814/libero
  mkdir -p "$LIBERO_PATH"
  printf "Y\n/work3/s234814/libero\nY\n" | uv run python -c "import libero.libero; print('Libero configured')"

  uv run python scripts/train_srpo.py \
      --sft-checkpoint {sft_checkpoint} \
      --simulator libero \
      --suite {suite} \
      --task-ids {task_id} \
      --data {data} \
      --mode {mode} \
      --num-demos {num_demos} \
      --seed {seed} \
      --lr {lr} \
      --iterations {num_iterations} \
      --num-rollout-envs {num_rollout_envs} \
      --fm-batch-size {fm_batch_size} \
      --ppo-epochs {ppo_epochs} \
      --clip-epsilon {clip_epsilon} \
      --kl-coeff {kl_coeff} \
      --eval-every {eval_every} \
      --eval-episodes {eval_episodes} \
      --max-steps {max_steps} \
      --world-model {world_model} \
      --wandb

# ── SRPO on Libero with demos from HuggingFace (no .pt / no SFT ckpt) ─
train-srpo-libero-hf: |
  export LIBERO_PATH=/work3/s234814/libero
  mkdir -p "$LIBERO_PATH"
  printf "Y\n/work3/s234814/libero\nY\n" | uv run python -c "import libero.libero; print('Libero configured')"

  uv run python scripts/train_srpo.py \
      --simulator libero \
      --suite {suite} \
      {task_id_flag} \
      --libero-suite {libero_suite} \
      {multitask_flag} \
      {trajs_per_task_flag} \
      --mode {mode} \
      --num-demos {num_demos} \
      --seed {seed} \
      --lr {lr} \
      --iterations {num_iterations} \
      --num-rollout-envs {num_rollout_envs} \
      --fm-batch-size {fm_batch_size} \
      --ppo-epochs {ppo_epochs} \
      --clip-epsilon {clip_epsilon} \
      --kl-coeff {kl_coeff} \
      --eval-every {eval_every} \
      --eval-episodes {eval_episodes} \
      --max-steps {max_steps} \
      --world-model {world_model} \
      --wandb

# ── SFT via native LeRobot training pipeline ─────────────────────────
train-lerobot: |
  uv run lerobot-train \
      --policy.type=smolvla \
      --policy.pretrained_path={policy_path} \
      --policy.push_to_hub=false \
      --dataset.repo_id={dataset_repo_id} \
      --dataset.use_imagenet_stats=false \
      --output_dir={output_dir} \
      --job_name={job_name} \
      --batch_size={batch_size} \
      --steps={steps} \
      --policy.device=cuda \
      --policy.use_amp=true \
      --resume={resume} \
      --wandb.enable=true

# ── Evaluate a saved checkpoint (sim-agnostic) ────────────────────────
eval-policy: |
  uv run python scripts/evaluate.py \
      --checkpoint-dir {checkpoint_dir} \
      --simulator {simulator} \
      --suite {suite} \
      --num-episodes {num_episodes} \
      --seed {seed}

# ── Evaluate via evaluation script in Libero ───────────────────────────
# Parity with lerobot-eval: suite all = libero_object, libero_spatial, libero_goal;
# num_episodes = eval.n_episodes; we run batch_size 1 (sequential).
eval-libero: |
  export LIBERO_PATH=/work3/s234814/libero
  mkdir -p "$LIBERO_PATH"
  printf "Y\n/work3/s234814/libero\nY\n" | uv run python -c "import libero.libero; print('Libero configured')"

  uv run python scripts/evaluate.py \
      --checkpoint {checkpoint} \
      --simulator libero \
      --suite {suite} \
      --num-episodes {num_episodes} \
      --device cuda \
      --wandb \
      --wandb-project {wandb_project}

# ── Evaluate via evaluation script in ManiSkill ────────────────────────
eval-maniskill: |
  uv run python scripts/evaluate.py \
      --checkpoint {checkpoint} \
      --simulator maniskill \
      --env-id {env_id} \
      --num-episodes {num_episodes} \
      --device cuda \
      --wandb \
      --wandb-project {wandb_project}
