train-smolvla: |
  uv run lerobot-train \
      --dataset.repo_id=HuggingFaceVLA/libero \
      --policy.type=smolvla \
      --policy.pretrained_path={model_id} \
      --policy.load_vlm_weights=true \
      --policy.push_to_hub=false \
      --policy.device=cuda \
      --policy.optimizer_lr={lr} \
      --env.type=libero \
      --env.task=libero_10 \
      --steps={steps} \
      --batch_size={batch_size} \
      --eval_freq=5000 \
      --eval.n_episodes=10 \
      --eval.batch_size=1 \
      --output_dir=outputs/{job_name} \
      --save_checkpoint=true \
      --save_freq=5000 \
      --wandb.enable=true \
      --wandb.project={wandb_project}

train-custom: |
  uv run python -m vla train \
      --simulator {simulator} \
      --suite {suite} \
      --steps {steps} \
      --batch-size {batch_size} \
      --lr {lr} \
      --device cuda \
      --save models/{job_name}.pt \
      --wandb-project {wandb_project}

train-rl: |
  uv run python -m vla train-rl \
      --checkpoint {checkpoint} \
      --simulator {simulator} \
      --suite {suite} \
      --num-iterations {num_iterations} \
      --trajectories-per-iter {trajectories_per_iter} \
      --lr {lr} \
      --max-steps {max_steps} \
      --device cuda \
      --save models/{job_name}.pt \
      --wandb-project {wandb_project}

eval-libero: |
  export LIBERO_PATH=/work3/s234814/libero
  mkdir -p "$LIBERO_PATH"
  printf "Y\n/work3/s234814/libero\nY\n" | uv run python -c "import libero.libero; print('Libero configured')"

  uv run python -m vla evaluate \
      --model {model} \
      --checkpoint {checkpoint} \
      --simulator libero \
      --suite {suite} \
      --num-episodes {num_episodes} \
      --device cuda \
      --compile \
      --wandb-project {wandb_project}

eval-maniskill: |
  uv run python -m vla evaluate \
      --model {model} \
      --checkpoint {checkpoint} \
      --simulator maniskill \
      --env-id {env_id} \
      --num-episodes {num_episodes} \
      --device cuda \
      --compile \
      --wandb-project {wandb_project}
