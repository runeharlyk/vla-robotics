# @package _global_

metadata:
  label: spatial-sft-chunk-sweep-mujoco332
  notes: >-
    Authoritative pinned-MuJoCo chunking sweep for the public SmolVLA LIBERO
    spatial checkpoint. Use this to replace the older mixed-commit/mixed-MuJoCo
    chunking degradation table. All runs use mujoco==3.3.2 from the current
    environment, fixed policy noise seed 42, and 100 episodes per task.

checkpoint_dir: null
checkpoint: HuggingFaceVLA/smolvla_libero
simulator: libero
suite: spatial
num_episodes: 100
num_envs: 8
max_steps: 220
seed: 42
fixed_noise_seed: 42
rollout_sampler: normal
wandb: true
wandb_project: vla-libero-eval

