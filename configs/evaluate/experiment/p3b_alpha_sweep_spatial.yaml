# @package _global_

metadata:
  label: p3b-alpha-sweep-spatial
  source_doc: docs/thesis_research_plan.md
  notes: |
    Thesis Phase 3, run B: WiSE-FT alpha sweep on spatial. Evaluates
    five interpolation points alpha in {0.0, 0.25, 0.5, 0.75, 1.0}
    between the SFT base (HuggingFaceVLA/smolvla_libero) and the
    Phase-2 selected RL checkpoint, all at 50 episodes per task with
    fixed_noise_seed=42.

    Why 50 ep/task and not 100:
    - 5 evaluations x 10 tasks x 50 ep = 2500 total rollouts in one
      job. At ~8 sec/episode on L40s with num_envs=8 that is roughly
      5-6 hours, well within the 24h budget.
    - The alpha sweep is a coarse search to *locate* the best alpha;
      we then re-evaluate the winner at 100 ep/task for the headline
      number (a single submit-eval invocation, ~3-4h).
    - Variance from 50 vs 100 ep is small in this regime (binomial
      SE on p=0.7 differs by 0.022 vs 0.015) -- enough resolution
      to pick a winner across 0.25-spaced alphas.

    Decision rule (vs SFT 0.743 and Phase-2 RL ckpt):
    - "Headline" alpha = argmax_alpha mean(SR_4suites_at_50ep). Since
      this experiment evaluates spatial only, alpha selection here is
      preliminary; final selection happens after Phase 5 cross-suite
      eval at 100 ep.
    - Sanity: alpha=0.0 must reproduce SFT within +/- 1pp (otherwise
      the SFT base load path is broken).
    - Sanity: alpha=1.0 must match the standalone RL eval suite-avg
      within +/- 1pp (the original Phase 2 result).
    - If the optimal alpha is at 0 or 1, document that WiSE-FT does
      not help in this regime; pure SFT or pure RL stays as main.

    Required override before submission:
    - Set checkpoint_dir to the Phase-2 selected RL checkpoint.
      Example: --checkpoint-dir /work3/s234814/vla-robotics/checkpoints/
                sparse_rl/<run-tag>_seed42_<jobid>/best

# Default checkpoint_dir is left empty (treated as "must be overridden
# at submission time"). The wise_ft_alpha field is varied per-eval.
checkpoint_dir: REPLACE_WITH_PHASE2_RL_CKPT_DIR
checkpoint: HuggingFaceVLA/smolvla_libero
suite: spatial
num_episodes: 50
n_action_steps: 1
seed: 42
fixed_noise_seed: 42

evaluations:
  - metadata:
      label: p3b-spatial-alpha-000-pure-sft
    wise_ft_alpha: 0.0
    wandb_name: eval_p3b_spatial_alpha_000

  - metadata:
      label: p3b-spatial-alpha-025
    wise_ft_alpha: 0.25
    wandb_name: eval_p3b_spatial_alpha_025

  - metadata:
      label: p3b-spatial-alpha-050
    wise_ft_alpha: 0.5
    wandb_name: eval_p3b_spatial_alpha_050

  - metadata:
      label: p3b-spatial-alpha-075
    wise_ft_alpha: 0.75
    wandb_name: eval_p3b_spatial_alpha_075

  - metadata:
      label: p3b-spatial-alpha-100-pure-rl
    wise_ft_alpha: 1.0
    wandb_name: eval_p3b_spatial_alpha_100
