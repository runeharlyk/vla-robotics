# @package _global_

metadata:
  label: flow-grpo-t5-sigma003-smoke1
  source_doc: docs/flow_grpo_paper_overview.md
  notes: >-
    One-iteration Flow-GRPO mechanics test after the SFT Flow-SDE scout.
    Scout result: normal chunk-5 SFT was 70.5% over 20 eps/task, while
    Flow-SDE sigma=0.03 reached 72.5%; this suggests the SDE rollout
    distribution is not destroying the policy before RL. This run checks
    whether one real logprob update completes and whether metrics/log-ratios
    are numerically sane before spending a full training job.

task_ids: "5"
mode: sparse_rl
update_method: flow_grpo
lr: 3e-6
iterations: 1
eval_every: 1
eval_episodes: 20
pre_rl_eval: false
trajs_per_task: 16
wandb_name: flow-grpo-t5-sigma003-smoke1

kl:
  coeff: 0.01
  sft_coeff: 0.005

ppo:
  epochs: 1
  minibatch_trajs: 4
  clip_epsilon: 0.05
  clip_epsilon_high: 0.08

sampling:
  dynamic: false
  dynamic_max_retries: 2

rollout:
  num_envs: 8
  eval_num_envs: 8
  n_action_steps: 5
  fm_batch_size: 64
  gradient_checkpointing: true
  eval_zero_sample: false

flow_grpo:
  sigma: 0.03
  sde_steps: 10
  logprob_reduction: mean
  log_ratio_clip: 5.0
  positive_adv_only: false
  negative_adv_scale: 1.0
