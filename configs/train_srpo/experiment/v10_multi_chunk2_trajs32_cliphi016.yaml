# @package _global_

metadata:
  label: v10-multi-chunk2-trajs32-cliphi016
  source_doc: docs/sparse_rl_path_to_90_spatial.md
  notes: |
    Production-grade multi-task FPO run. First multi-task config with
    eval_episodes=100 under the post-3c291f23 env reset distribution.
    Closes two open questions left by v8 (chunk-5 trajs=8 scout) and
    v9 (chunk-1 trajs=8 scout, chunk-5 trajs=8 cliphi=0.12 scout):

    Hypotheses tested
    -----------------
    H1: With trajs_per_task=32 (proper LOO baseline), 100-episode eval,
        and 30 iterations, the v7 stability recipe (sftkl=0.02 + demos
        + replay + dynamic sampling) beats SFT 0.743 on suite-average
        by >= 5 pp at 95 percent CI. v7 at trajs=32 reported 0.795 best
        but only at 20 ep so the result was never statistically
        confirmed.
    H2: Clip-higher 0.05/0.16 (the priority-a lever from
        sparse_rl_path_to_90_spatial.md section 8) lets the FPO trust
        region actually bind. Diagnostic: mean_ratio should drift
        away from 1.0 more than v8/v9 (which were stuck at 1.000-1.007),
        and clip_frac should stay non-zero throughout instead of
        collapsing to 0 after iter ~12. Existing v9 run with cliphi=0.12
        at trajs=8 already showed signs of life on this metric but eval
        was scout-noisy.
    H3: chunk-2 training transfers to chunk-1 eval acceptably (4 pp
        SFT degradation vs 12 pp at chunk-5 in our eval table). If the
        chunk-1 external eval is materially worse than the chunk-2
        internal eval, multi-task chunk-aware training under the new
        env is broken and v11 must train at chunk-1 despite the wall
        clock cost.

    Decision rules
    --------------
    - Suite-avg at 100 ep at iter 30 >= 0.78 AND chunk-1 external eval
      of the best checkpoint is >= 0.77: confirmed beat. Promote to
      WiSE-FT alpha sweep (W5) and queue v11 with cliphi=0.20 plus the
      W9 rollout-temperature plumbing.
    - Suite-avg in [0.74, 0.78]: marginal beat at the protocol level;
      chunk-2 transfer is the dominant uncertainty. Submit v11 at
      chunk-1 (eat the wall-clock cost) before drawing conclusions
      about clip-higher.
    - Suite-avg < 0.74: regression vs SFT. Read clip_frac, mean_ratio,
      raw_sft_kl, non_zero_adv_ratio per iter to diagnose.
        a) If clip_frac stays < 0.05 and mean_ratio stuck at 1.0:
           trust region never bound; rollout temperature (W9) is the
           next experiment.
        b) If raw_sft_kl > 1.0 by iter 20: SFT anchor failure mode
           from section 11 reappeared at trajs=32; raise sft_kl_coeff
           to 0.04 or anchor on demos only.
        c) If non_zero_adv_ratio < 0.5 by iter 15: per-task LOO is
           dropping too many groups; switch to global RLOO via the
           rloo_over_all_rollouts flag added with the diagnostic patch.

task_ids: all
mode: sparse_rl
update_method: fpo
lr: 2e-6
trajs_per_task: 32
iterations: 30
eval_every: 10
eval_episodes: 100
max_steps: 220
seed: 42
wandb_name: v10-multi-chunk2-trajs32-cliphi016-eval100

ppo:
  epochs: 1
  minibatch_trajs: 4
  clip_epsilon: 0.05
  clip_epsilon_high: 0.16

kl:
  coeff: 0.01
  sft_coeff: 0.02

replay:
  include_demos: true
  success_total_size: 320
  success_alpha: 1.0
  success_ema_decay: 0.8
  success_max_ratio: 0.5

sampling:
  dynamic: true
  dynamic_max_retries: 2

rollout:
  n_action_steps: 2

fpo:
  full_chunk_target: true
  num_fm_noise_samples: 4
  negative_adv_scale: 1.0
