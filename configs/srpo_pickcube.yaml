env_id: "PickCube-v1"
checkpoint: "HuggingFaceVLA/smolvla_libero"
instruction: "pick up the red cube and move it to the green goal"
action_dim: 8
image_size: 256
data_path: "data/preprocessed/pickcube.pt"

demo_counts: [5]
seeds: [42, 123, 456]

sft:
  lr: 1.0e-4
  batch_size: 32
  num_epochs: 50
  eval_every: 5
  eval_episodes: 50
  max_steps: 200

srpo:
  lr: 1.0e-5
  num_iterations: 100
  trajectories_per_iter: 16
  ppo_epochs: 4
  clip_epsilon: 0.2
  kl_coeff: 0.01
  max_grad_norm: 1.0
  eval_every: 10
  eval_episodes: 50
  max_steps: 200
  world_model_type: "dinov2"   # "dinov2" or "vjepa2"
  subsample_every: 5
  dbscan_eps: 0.5
  dbscan_min_samples: 2
  num_fm_noise_samples: 4
  gamma: 0.99
  reward_scale: 1.0

sparse_rl:
  lr: 1.0e-5
  num_iterations: 100
  trajectories_per_iter: 16
  ppo_epochs: 4
  clip_epsilon: 0.2
  kl_coeff: 0.01
  max_grad_norm: 1.0
  eval_every: 10
  eval_episodes: 50
  max_steps: 200
