env_id: "PickCube-v1"
checkpoint: "HuggingFaceVLA/smolvla_libero"
instruction: "pick up the red cube and move it to the green goal"
action_dim: 8
image_size: 256
data_path: "/work3/s234814/vla-robotics/data/preprocessed/pickcube.pt"

demo_counts: [5]
seeds: [42, 123, 456]

sft:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 1.0e-10
  grad_clip_norm: 10.0
  warmup_steps: 1000
  decay_steps: 30000
  decay_lr: 2.5e-6
  batch_size: 64
  micro_batch_size: 4
  num_epochs: 50
  eval_every: 5
  eval_episodes: 50
  max_steps: 200

srpo:
  lr: 1.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-10
  max_grad_norm: 1.0
  num_iterations: 100
  ppo_epochs: 1
  clip_epsilon: 0.2
  kl_coeff: 0.01
  eval_every: 10
  eval_episodes: 50
  max_steps: 200
  world_model_type: "dinov2" # "dinov2" or "vjepa2"
  subsample_every: 5
  dbscan_eps: 0.5
  dbscan_min_samples: 2
  num_fm_noise_samples: 4
  gamma: 0.99
  reward_scale: 1.0

sparse_rl:
  lr: 1.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-10
  max_grad_norm: 1.0
  num_iterations: 100
  ppo_epochs: 1
  clip_epsilon: 0.2
  kl_coeff: 0.01
  eval_every: 10
  eval_episodes: 50
  max_steps: 200
