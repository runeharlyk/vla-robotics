action: train-srpo-libero-hf

libero_suite: spatial
suite: spatial
multitask_flag: --task-ids all
trajs_per_task_flag: --trajs-per-task 4
mode: srpo
num_demos: 5
seed: 42
lr: 5.0e-6
num_iterations: 200
num_rollout_envs: 8
fm_batch_size: 8
ppo_epochs: 1
clip_epsilon: 0.2
kl_coeff: 0.01
dbscan_eps: 60
eval_every: 20
eval_episodes: 10
max_steps: 280
world_model: vjepa2
gradient_checkpointing: true
distance_metric: normalized_l2
use_failure_rewards: false
